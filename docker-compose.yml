services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or environment}
      - ALLOWED_ORIGINS=http://localhost:8000,http://localhost:3000
      # Optional: set LLM_PROVIDER=groq + GROQ_API_KEY in .env to use Groq
      # for generation. Embeddings always go through the Ollama service above.
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - app_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
  app_data:
